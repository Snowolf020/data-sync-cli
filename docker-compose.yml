version: '3'

services:
  postgres:
    image: postgres:14
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=data-sync-cli
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  sqlite:
    image: busybox
    volumes:
      - sqlite-data:/app
    command: sleep 1000

  redis:
    image: redis:7
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"

  app:
    build: .
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=data-sync-cli
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - SQLITE_DB_PATH=/app/database.db
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      - postgres
      - sqlite
      - redis
    volumes:
      - .:/app

volumes:
  postgres-data:
  sqlite-data:
  redis-data: